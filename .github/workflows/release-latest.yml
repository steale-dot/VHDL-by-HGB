name: Release Latest

on:
  push:
    branches:
      - main

jobs:

  CI:
    uses: ./.github/workflows/ci.yml

  release-latest:
    needs: CI
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install dependencies
        run: npm install

      - name: Package extension
        run: ./node_modules/.bin/vsce package --out vhdl-by-hgb-latest.vsix

      - name: Publish GitHub Release (latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          prerelease: true
          make_latest: false
          body: |
            Automated build from the latest commit on `main`.
          files: vhdl-by-hgb-latest.vsix
